    /* Critical CSS to prevent FOUC */

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

  <!-- Structured Data / JSON-LD FAQ Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What makes Noon truly anonymous compared to Google Forms or Typeform?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Traditional tools rely on privacy policies and still record your IP address, browser fingerprint, or account token. Noon uses RSA blind signatures—a cryptographic protocol that guarantees your identity is separated from your response before it reaches our servers, making tracking mathematically impossible."
          }
        },
        {
          "@type": "Question",
          "name": "How do RSA blind signatures work in anonymous feedback forms?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "When you submit a form, your browser blinds (encrypts) the response before sending it to the Noon server to be cryptographically signed. The server verifies your permission to submit without seeing the response itself. Your browser then unblinds the signature, resulting in a verified, completely anonymous submission."
          }
        },
        {
          "@type": "Question",
          "name": "Can Noon admins or developers trace who submitted a response?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Due to the mathematical design of RSA blind signatures, it is physically and cryptographically impossible for admins, developers, or even Noon's own servers to link a form response to the IP address or user who sent it."
          }
        },
        {
          "@type": "Question",
          "name": "Do users need a cryptographic key or technical knowledge to submit feedback?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not at all. All the complex cryptographic blinding, signing, and verification happen completely in the background in the user's browser. To a user, submitting a Noon form is as simple and fast as filling out any standard online form."
          }
        },
        {
          "@type": "Question",
          "name": "Is Noon free to use, and is it open source?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Noon is fully open source under the MIT license, allowing anyone to inspect the cryptographic protocol. The platform offers a generous free tier for secure, anonymous feedback, with premium subscription plans available for advanced form building and team management."
          }
        }
      ]
    }
  </script>
</head>
