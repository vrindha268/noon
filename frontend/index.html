<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Noon is a privacy-preserving form submission system that enables anonymous responses while maintaining authenticity verification, powered by blind signature cryptography." />
  <meta name="keywords"
    content="anonymous forms, blind signatures, privacy-preserving, secure surveys, cryptography, rust, react, noon, lupyd foundation" />
  <meta name="author" content="Lupyd Foundation" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://noon.lupyd.com/" />
  <meta property="og:title" content="NOON | Truly Anonymous Forms" />
  <meta property="og:description"
    content="Privacy-preserving form submission system that enables anonymous responses while maintaining authenticity verification." />
  <meta property="og:image" content="https://noon.lupyd.com/noon.webp" />
  <meta property="og:site_name" content="Noon" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://noon.lupyd.com/" />
  <meta property="twitter:title" content="NOON | Truly Anonymous Forms" />
  <meta property="twitter:description"
    content="Privacy-preserving form submission system that enables anonymous responses while maintaining authenticity verification." />
  <meta property="twitter:image" content="https://noon.lupyd.com/noon.webp" />

  <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon-dark.svg" />
  <title>NOON | Truly Anonymous Forms</title>

  <!-- Link CSS asynchronously to avoid blocking the critical path -->
  <link rel="preload" href="/src/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="/src/App.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="/src/App.css">
  </noscript>

  <link rel="preconnect" href="https://noon-api.lupyd.com" crossorigin>

  <style>
    /* Critical CSS to prevent FOUC */
    :root {
      --bg: #030712;
      --text: #f8fafc;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
